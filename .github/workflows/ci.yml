name: CI

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: portfolio
          POSTGRES_USER: portfolio
          POSTGRES_PASSWORD: portfolio
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U portfolio -d portfolio"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      minio:
        image: minio/minio:RELEASE.2025-02-28T09-55-16Z
        env:
          MINIO_ROOT_USER: minio
          MINIO_ROOT_PASSWORD: minio123
        ports:
          - 9000:9000
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/live || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        volumes:
          - /tmp/minio-data:/data
        command: server /data --console-address ":9001"
    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/portfolio
      SPRING_DATASOURCE_USERNAME: portfolio
      SPRING_DATASOURCE_PASSWORD: portfolio
      PORTFOLIO_ADMIN_USERNAME: admin
      PORTFOLIO_ADMIN_PASSWORD: change-me
      PORTFOLIO_R2_ENDPOINT: http://localhost:9000
      PORTFOLIO_R2_REGION: auto
      PORTFOLIO_R2_ACCESS_KEY: minio
      PORTFOLIO_R2_SECRET_KEY: minio123
      PORTFOLIO_R2_BUCKET: portfolio-assets
      PORTFOLIO_STORAGE_PUBLIC_URL: http://localhost:9000/portfolio-assets
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Prepare MinIO bucket
        run: |
          curl -fsSL https://dl.min.io/client/mc/release/linux-amd64/mc -o /usr/local/bin/mc
          chmod +x /usr/local/bin/mc
          until mc alias set local http://localhost:9000 minio minio123; do sleep 1; done
          mc mb --ignore-existing local/portfolio-assets
          mc anonymous set public local/portfolio-assets
      - run: chmod +x gradlew
      - run: ./gradlew check

server:
  servlet:
    session:
      cookie:
        same-site: lax

spring:
  application:
    name: portfolio-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/portfolio}
    username: ${SPRING_DATASOURCE_USERNAME:portfolio}
    password: ${SPRING_DATASOURCE_PASSWORD:portfolio}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
  jackson:
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

management:
  endpoints:
    web:
      exposure:
        include: health,info

portfolio:
  mail:
    enabled: ${MAIL_ENABLED:false}
    from: ${MAIL_USERNAME:noreply@example.com}
    to: ${MAIL_TO:${MAIL_USERNAME:noreply@example.com}}
  admin:
    username: ${PORTFOLIO_ADMIN_USERNAME:admin}
    password: ${PORTFOLIO_ADMIN_PASSWORD:change-me}
  storage:
    endpoint: ${PORTFOLIO_R2_ENDPOINT:http://localhost:9000}
    region: ${PORTFOLIO_R2_REGION:auto}
    access-key: ${PORTFOLIO_R2_ACCESS_KEY:minio}
    secret-key: ${PORTFOLIO_R2_SECRET_KEY:minio123}
    bucket: ${PORTFOLIO_R2_BUCKET:portfolio-assets}
    public-url: ${PORTFOLIO_STORAGE_PUBLIC_URL:http://localhost:9000/portfolio-assets}
  webhook:
    revalidate-url: ${PORTFOLIO_WEBHOOK_REVALIDATE_URL:http://localhost:3000/api/revalidate}
    revalidate-secret: ${NEXT_REVALIDATE_SECRET:change-me}

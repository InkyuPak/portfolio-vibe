<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#04080f"/>
      <stop offset="100%" stop-color="#060d12"/>
    </linearGradient>
    <!-- Accent glow -->
    <radialGradient id="glow-tl" cx="15%" cy="20%" r="40%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-br" cx="85%" cy="80%" r="35%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <!-- Line gradient -->
    <linearGradient id="line-h" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0"/>
      <stop offset="50%" stop-color="#10b981" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </linearGradient>
    <!-- Title gradient -->
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#d1fae5"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <filter id="glow-node" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="text-glow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow-tl)"/>
  <rect width="1200" height="630" fill="url(#glow-br)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#10b981" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#10b981" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="300" y1="0" x2="300" y2="630" stroke="#10b981" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#10b981" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="900" y1="0" x2="900" y2="630" stroke="#10b981" stroke-opacity="0.04" stroke-width="1"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#line-h)"/>

  <!-- ─── LEFT PANEL — project identity ─── -->
  <!-- CASE STUDY label -->
  <rect x="60" y="72" width="120" height="24" rx="12" fill="#10b981" fill-opacity="0.12"/>
  <rect x="60" y="72" width="120" height="24" rx="12" stroke="#10b981" stroke-opacity="0.35" stroke-width="1"/>
  <text x="120" y="88.5" text-anchor="middle" fill="#10b981" font-size="10" font-family="monospace" font-weight="700" letter-spacing="3">CASE STUDY</text>

  <!-- Project title -->
  <text x="60" y="175" fill="url(#title-grad)" font-size="84" font-family="system-ui, -apple-system, sans-serif" font-weight="900" letter-spacing="-3">RFP-Hunter</text>

  <!-- Subtitle -->
  <text x="60" y="215" fill="#a7f3d0" font-size="20" font-family="system-ui, -apple-system, sans-serif" font-weight="400" opacity="0.85">AI 기반 사업공모 자동 탐색 · 평가 시스템</text>

  <!-- Description -->
  <text x="60" y="258" fill="#ffffff" font-size="14" font-family="system-ui, -apple-system, sans-serif" opacity="0.42">17개 사이트 크롤링 → 다형식 문서 파싱 → Claude MCP 평가 → Notion 자동 아카이빙</text>

  <!-- Stats row -->
  <!-- Stat 1 -->
  <rect x="60" y="295" width="130" height="64" rx="12" fill="#10b981" fill-opacity="0.07" stroke="#10b981" stroke-opacity="0.20" stroke-width="1"/>
  <text x="75" y="316" fill="#6ee7b7" font-size="10" font-family="monospace" font-weight="600" letter-spacing="2" opacity="0.7">크롤링 대상</text>
  <text x="75" y="347" fill="#ffffff" font-size="28" font-family="system-ui, -apple-system, sans-serif" font-weight="900">17개</text>

  <!-- Stat 2 -->
  <rect x="208" y="295" width="130" height="64" rx="12" fill="#10b981" fill-opacity="0.07" stroke="#10b981" stroke-opacity="0.20" stroke-width="1"/>
  <text x="223" y="316" fill="#6ee7b7" font-size="10" font-family="monospace" font-weight="600" letter-spacing="2" opacity="0.7">파일 형식</text>
  <text x="223" y="347" fill="#ffffff" font-size="28" font-family="system-ui, -apple-system, sans-serif" font-weight="900">5+ 종</text>

  <!-- Stat 3 -->
  <rect x="356" y="295" width="130" height="64" rx="12" fill="#10b981" fill-opacity="0.07" stroke="#10b981" stroke-opacity="0.20" stroke-width="1"/>
  <text x="371" y="316" fill="#6ee7b7" font-size="10" font-family="monospace" font-weight="600" letter-spacing="2" opacity="0.7">평가 등급</text>
  <text x="371" y="347" fill="#ffffff" font-size="28" font-family="system-ui, -apple-system, sans-serif" font-weight="900">A ~ D</text>

  <!-- Tags -->
  <!-- Python -->
  <rect x="60" y="390" width="72" height="26" rx="6" fill="#10b981" fill-opacity="0.10" stroke="#10b981" stroke-opacity="0.30" stroke-width="1"/>
  <text x="96" y="407.5" text-anchor="middle" fill="#10b981" font-size="11" font-family="monospace" font-weight="600">Python</text>
  <!-- Claude MCP -->
  <rect x="142" y="390" width="96" height="26" rx="6" fill="#10b981" fill-opacity="0.10" stroke="#10b981" stroke-opacity="0.30" stroke-width="1"/>
  <text x="190" y="407.5" text-anchor="middle" fill="#10b981" font-size="11" font-family="monospace" font-weight="600">Claude MCP</text>
  <!-- Notion -->
  <rect x="248" y="390" width="66" height="26" rx="6" fill="#10b981" fill-opacity="0.10" stroke="#10b981" stroke-opacity="0.30" stroke-width="1"/>
  <text x="281" y="407.5" text-anchor="middle" fill="#10b981" font-size="11" font-family="monospace" font-weight="600">Notion</text>
  <!-- HWP -->
  <rect x="324" y="390" width="54" height="26" rx="6" fill="#10b981" fill-opacity="0.10" stroke="#10b981" stroke-opacity="0.30" stroke-width="1"/>
  <text x="351" y="407.5" text-anchor="middle" fill="#10b981" font-size="11" font-family="monospace" font-weight="600">HWP</text>

  <!-- Vertical divider -->
  <line x1="540" y1="60" x2="540" y2="570" stroke="#10b981" stroke-opacity="0.10" stroke-width="1" stroke-dasharray="4 8"/>

  <!-- ─── RIGHT PANEL — pipeline visualization (shifted down +54px) ─── -->
  <!-- Panel title -->
  <text x="592" y="142" fill="#10b981" font-size="10" font-family="monospace" font-weight="700" letter-spacing="3" opacity="0.7">AUTOMATION PIPELINE</text>

  <!-- Node 1: 크롤링 -->
  <rect x="592" y="172" width="156" height="76" rx="14" fill="#0a1a14" stroke="#10b981" stroke-opacity="0.35" stroke-width="1.5"/>
  <rect x="592" y="172" width="156" height="4" rx="2" fill="#10b981" fill-opacity="0.6"/>
  <text x="670" y="205" text-anchor="middle" fill="#10b981" font-size="10" font-family="monospace" font-weight="700" letter-spacing="2" opacity="0.8">01 · CRAWL</text>
  <text x="670" y="226" text-anchor="middle" fill="#ffffff" font-size="13" font-family="system-ui, sans-serif" font-weight="600">17개 사이트 수집</text>

  <!-- Arrow -->
  <line x1="748" y1="210" x2="780" y2="210" stroke="#10b981" stroke-opacity="0.45" stroke-width="1.5"/>
  <polyline points="773,203 782,210 773,217" fill="none" stroke="#10b981" stroke-opacity="0.6" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Node 2: 파싱 -->
  <rect x="790" y="172" width="156" height="76" rx="14" fill="#0a1a14" stroke="#10b981" stroke-opacity="0.35" stroke-width="1.5"/>
  <rect x="790" y="172" width="156" height="4" rx="2" fill="#10b981" fill-opacity="0.6"/>
  <text x="868" y="205" text-anchor="middle" fill="#10b981" font-size="10" font-family="monospace" font-weight="700" letter-spacing="2" opacity="0.8">02 · PARSE</text>
  <text x="868" y="226" text-anchor="middle" fill="#ffffff" font-size="13" font-family="system-ui, sans-serif" font-weight="600">HWP · PDF · XLSX</text>

  <!-- Arrow down from Node 2 -->
  <line x1="868" y1="248" x2="868" y2="280" stroke="#10b981" stroke-opacity="0.45" stroke-width="1.5"/>
  <polyline points="861,273 868,282 875,273" fill="none" stroke="#10b981" stroke-opacity="0.6" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Node 3: MCP 서버 -->
  <rect x="790" y="292" width="156" height="76" rx="14" fill="#0a1a14" stroke="#10b981" stroke-opacity="0.35" stroke-width="1.5"/>
  <rect x="790" y="292" width="156" height="4" rx="2" fill="#10b981" fill-opacity="0.6"/>
  <text x="868" y="325" text-anchor="middle" fill="#10b981" font-size="10" font-family="monospace" font-weight="700" letter-spacing="2" opacity="0.8">03 · MCP SERVER</text>
  <text x="868" y="346" text-anchor="middle" fill="#ffffff" font-size="13" font-family="system-ui, sans-serif" font-weight="600">Python 커스텀 서버</text>

  <!-- Arrow left from Node 3 -->
  <line x1="790" y1="330" x2="758" y2="330" stroke="#10b981" stroke-opacity="0.45" stroke-width="1.5"/>
  <polyline points="765,323 756,330 765,337" fill="none" stroke="#10b981" stroke-opacity="0.6" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Node 4: Claude 평가 -->
  <rect x="592" y="292" width="156" height="76" rx="14" fill="#0a1a14" stroke="#10b981" stroke-opacity="0.35" stroke-width="1.5"/>
  <rect x="592" y="292" width="156" height="4" rx="2" fill="#10b981" fill-opacity="0.6"/>
  <text x="670" y="325" text-anchor="middle" fill="#10b981" font-size="10" font-family="monospace" font-weight="700" letter-spacing="2" opacity="0.8">04 · EVALUATE</text>
  <text x="670" y="346" text-anchor="middle" fill="#ffffff" font-size="13" font-family="system-ui, sans-serif" font-weight="600">Claude A/B/C/D</text>

  <!-- Arrow down from Node 4 -->
  <line x1="670" y1="368" x2="670" y2="400" stroke="#10b981" stroke-opacity="0.45" stroke-width="1.5"/>
  <polyline points="663,393 670,402 677,393" fill="none" stroke="#10b981" stroke-opacity="0.6" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Node 5: Notion + Drive (full width) -->
  <rect x="592" y="412" width="354" height="76" rx="14" fill="#0a1a14" stroke="#10b981" stroke-opacity="0.35" stroke-width="1.5"/>
  <rect x="592" y="412" width="354" height="4" rx="2" fill="#10b981" fill-opacity="0.6"/>
  <text x="769" y="445" text-anchor="middle" fill="#10b981" font-size="10" font-family="monospace" font-weight="700" letter-spacing="2" opacity="0.8">05 · ARCHIVE</text>
  <text x="769" y="466" text-anchor="middle" fill="#ffffff" font-size="13" font-family="system-ui, sans-serif" font-weight="600">Notion DB + Google Drive 자동 아카이빙</text>

  <!-- Grade badges floating -->
  <!-- A -->
  <rect x="976" y="172" width="52" height="52" rx="10" fill="#10b981" fill-opacity="0.15" stroke="#10b981" stroke-opacity="0.50" stroke-width="1.5"/>
  <text x="1002" y="206" text-anchor="middle" fill="#10b981" font-size="26" font-family="system-ui, sans-serif" font-weight="900">A</text>
  <!-- B -->
  <rect x="1040" y="172" width="52" height="52" rx="10" fill="#3b82f6" fill-opacity="0.10" stroke="#3b82f6" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="1066" y="206" text-anchor="middle" fill="#93c5fd" font-size="26" font-family="system-ui, sans-serif" font-weight="900">B</text>
  <!-- C -->
  <rect x="976" y="236" width="52" height="52" rx="10" fill="#f59e0b" fill-opacity="0.10" stroke="#f59e0b" stroke-opacity="0.30" stroke-width="1.5"/>
  <text x="1002" y="270" text-anchor="middle" fill="#fcd34d" font-size="26" font-family="system-ui, sans-serif" font-weight="900">C</text>
  <!-- D -->
  <rect x="1040" y="236" width="52" height="52" rx="10" fill="#ef4444" fill-opacity="0.08" stroke="#ef4444" stroke-opacity="0.25" stroke-width="1.5"/>
  <text x="1066" y="270" text-anchor="middle" fill="#fca5a5" font-size="26" font-family="system-ui, sans-serif" font-weight="900">D</text>

  <text x="1003" y="318" text-anchor="middle" fill="#10b981" font-size="9" font-family="monospace" font-weight="600" opacity="0.5" letter-spacing="1.5">지원 등급</text>

  <!-- Bottom bar -->
  <line x1="0" y1="570" x2="1200" y2="570" stroke="#10b981" stroke-opacity="0.08" stroke-width="1"/>
  <text x="60" y="597" fill="#10b981" font-size="12" font-family="monospace" opacity="0.35">pak.dev / projects / rfp-hunter</text>
  <text x="1140" y="597" text-anchor="end" fill="#10b981" font-size="11" font-family="monospace" opacity="0.30">2026.01 ~ 03</text>
</svg>

  <line x1="280" y1="268" x2="385" y2="358" stroke="#415063" stroke-opacity="0.2" stroke-width="1.5" stroke-dasharray="5 4"/>
  <line x1="175" y1="442" x2="258" y2="498" stroke="#415063" stroke-opacity="0.15" stroke-width="1.5" stroke-dasharray="5 4"/>
  <line x1="385" y1="442" x2="302" y2="498" stroke="#415063" stroke-opacity="0.15" stroke-width="1.5" stroke-dasharray="5 4"/>


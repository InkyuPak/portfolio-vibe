<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0f4f8"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#415063" flood-opacity="0.12"/>
    </filter>
    <filter id="shadowSm">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#415063" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <!-- Subtle dot pattern -->
  <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
    <circle cx="12" cy="12" r="0.8" fill="#415063" fill-opacity="0.06"/>
  </pattern>
  <rect width="1600" height="900" fill="url(#dots)"/>

  <!-- ═══ Title bar ═══ -->

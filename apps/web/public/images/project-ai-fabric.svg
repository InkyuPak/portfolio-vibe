    <rect x="-12" y="-12" width="24" height="24" rx="4" fill="none" stroke="#415063" stroke-width="1.5"/>
    <line x1="-12" y1="-2" x2="12" y2="-2" stroke="#415063" stroke-width="1" stroke-opacity="0.4"/>
    <text y="58" text-anchor="middle" fill="#1e293b" font-family="system-ui,sans-serif" font-size="10" font-weight="600">Order Svc</text>

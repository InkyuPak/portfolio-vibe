    <text y="68" text-anchor="middle" fill="#1e293b" font-family="system-ui,sans-serif" font-size="11" font-weight="700">API Gateway</text>
    <text y="82" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="8" font-weight="600">200 OK · 4ms</text>
